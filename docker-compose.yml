version: "3.8"

services:
  mysql:
    container_name: mysql
    image: mysql
    environment:
      MYSQL_DATABASE: "devops"
      MYSQL_ROOT_PASSWORD: "root"
    ports:
      - "3306:3306"
    volumes:
      - myv:/var/lib/mysql
    networks:
     - mynetwork
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  flask:
    build:
      context: .
    container_name: two
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: root
      MYSQL_USER: root
      MYSQL_DB: devops
    networks:
     - mynetwork
    depends_on:
      - mysql
    restart: always
     healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
volumes:
   myv:
networks:
    mynetwork:
